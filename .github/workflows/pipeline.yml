# Daily ingestion: run the Medallion pipeline, writing straight to MotherDuck (the production
# data layer). No data is committed to git — Streamlit Cloud reads the same MotherDuck database.
name: Pipeline

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      SKILLRADAR_MOTHERDUCK_DB: skillradar
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install --system -e .

      - name: Run pipeline (writes to MotherDuck)
        run: python -m skillradar.interface.cli --trigger github-actions

      - name: Notify on failure
        if: failure()
        env:
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }} # Discord webhook URL (optional)
        run: |
          if [ -n "$ALERT_WEBHOOK" ]; then
            curl -sf -H "Content-Type: application/json" \
              -d "{\"content\":\"⚠️ SkillRadar daily pipeline failed — run ${GITHUB_RUN_ID}. See GitHub Actions.\"}" \
              "$ALERT_WEBHOOK" || true
          fi
