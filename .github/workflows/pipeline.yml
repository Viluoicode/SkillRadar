# Daily ingestion: run the Medallion pipeline, writing straight to MotherDuck (the production
# data layer). No data is committed to git — Streamlit Cloud reads the same MotherDuck database.
name: Pipeline

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      SKILLRADAR_MOTHERDUCK_DB: skillradar
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e .

      # dbt owns the Silver→Gold transform (the star schema + Gold marts). Isolated env so its deps
      # never clash with the app's; the CLI invokes it via SKILLRADAR_DBT_EXE.
      - name: Install dbt (isolated env)
        run: |
          uv venv --python 3.12 .dbtvenv
          uv pip install --python .dbtvenv/bin/python "dbt-duckdb>=1.9"

      - name: Run pipeline (Silver in Python, Gold via dbt → MotherDuck)
        env:
          SKILLRADAR_DBT_EXE: ${{ github.workspace }}/.dbtvenv/bin/dbt
        run: uv run python -m skillradar.interface.cli --gold dbt --trigger github-actions

      - name: Notify on failure
        if: failure()
        env:
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }} # Discord webhook URL (optional)
        run: |
          if [ -n "$ALERT_WEBHOOK" ]; then
            curl -sf -H "Content-Type: application/json" \
              -d "{\"content\":\"⚠️ SkillRadar daily pipeline failed — run ${GITHUB_RUN_ID}. See GitHub Actions.\"}" \
              "$ALERT_WEBHOOK" || true
          fi
