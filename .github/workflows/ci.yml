# Lint + tests for the Python pipeline (the repository root). The original .NET solution is
# archived at the git tag dotnet-archive and is intentionally not built or tested here.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      # dbt lives in its own env (dbt-core has no Python 3.14 wheels, and isolating it avoids
      # clashing with the app's deps). The parity test finds it via SKILLRADAR_DBT_EXE and runs a
      # real `dbt build` + dbt tests on a fixture warehouse.
      - name: Install dbt (isolated env)
        run: |
          uv venv --python 3.12 .dbtvenv
          uv pip install --python .dbtvenv/bin/python "dbt-duckdb>=1.9"

      - name: Ruff
        run: uv run ruff check .

      - name: Tests (incl. dbt parity)
        env:
          SKILLRADAR_DBT_EXE: ${{ github.workspace }}/.dbtvenv/bin/dbt
        run: uv run pytest
