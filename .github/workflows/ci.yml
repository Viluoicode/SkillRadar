# Lint + tests for the Python pipeline (the repository root). The original .NET solution is
# archived at the git tag dotnet-archive and is intentionally not built or tested here.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest
