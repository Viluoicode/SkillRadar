# Lint + tests for the Python pipeline (the repository root). The archived .NET solution
# under reference/dotnet-original/ is intentionally not built or tested here.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest
