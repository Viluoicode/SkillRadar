# Lint + tests. Assumes the `python/` folder is the repository root.
# If this lives inside a larger repo, move it to the repo's `.github/workflows/`
# and add `working-directory: python` to each run step (or a top-level `defaults`).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest
